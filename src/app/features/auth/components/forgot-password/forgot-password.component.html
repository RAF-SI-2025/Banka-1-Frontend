<div class="auth-page">
  <div class="auth-card">
    <button type="button" class="back-link" (click)="goToLogin()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back to login
    </button>

    <!-- Before submission -->
    <div *ngIf="!isSubmitted">
      <div class="auth-header">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h1 class="auth-title">Forgot password</h1>
        <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>
      </div>

      <div class="alert alert-error" *ngIf="errorMessage">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="15" y1="9" x2="9" y2="15"></line>
          <line x1="9" y1="9" x2="15" y2="15"></line>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <form class="auth-form" (ngSubmit)="onSubmit()" novalidate>
        <div class="form-field">
          <label for="email">Email address</label>
          <input
            id="email"
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="Enter your email"
            autocomplete="email"
          />
        </div>

        <button type="submit" class="btn-primary btn-full" [disabled]="isLoading">
          <svg *ngIf="isLoading" class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
          </svg>
          {{ isLoading ? 'Sending...' : 'Send reset link' }}
        </button>
      </form>
    </div>

    <!-- After submission success -->
    <div *ngIf="isSubmitted" class="success-state">
      <div class="success-icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
      </div>
      <h2>Check your email</h2>
      <p>We sent a password reset link to <strong>{{ email }}</strong>. Click the link in the email to reset your password.</p>
      <button type="button" class="btn-primary btn-full" style="margin-top: 24px;" (click)="goToLogin()">
        Back to login
      </button>
    </div>
  </div>
</div>
